# ---------------------------------------------------------------
# 1. MODEL ARCHITECTURE
# ---------------------------------------------------------------
model:
  architecture: "csrnet"

# ---------------------------------------------------------------
# 2. INFERENCE & CHECKPOINTS
# ---------------------------------------------------------------
inference:
  # CSRNet weights (ShanghaiTech)
  checkpoint_A: "checkpoints/best_model.pth"
  
  # YOLO weights (WiderPerson)
  checkpoint_yolo: "yolov8n.pt"
  
  # Calibration Factors
  factor_sparse: 64.0
  factor_dense: 12.0

# ---------------------------------------------------------------
# 3. DATASET & PROCESSING
# ---------------------------------------------------------------
dataset:
  name: "ShanghaiTech_Part_A"
  root: "./data/shanhai_data/shanghaitech/ShanghaiTech/part_A"
  annotation_format: "mat"
  train_image_dir: "train_data/images"
  train_annotation_dir: "train_data/ground-truth"
  val_image_dir: "test_data/images"
  val_annotation_dir: "test_data/ground-truth"
  density_sigma: 15
  adaptive_sigma: true
  image_size: [640, 480]
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  output_stride: 8
  k_nearest: 3

# ---------------------------------------------------------------
# 4. SYSTEM SETTINGS
# ---------------------------------------------------------------
system:
  device: "auto"
  log_csv: "logs/crowd_data.csv"
  webcam_source: 0

# ---------------------------------------------------------------
# 5. TRAINING & EVALUATION
# ---------------------------------------------------------------
training:
  batch_size: 1
  epochs: 20
  learning_rate: 0.00001
  weight_decay: 0.0001
  optimizer: "adam"
  loss_function: "mse"
  checkpoint_dir: "checkpoints"

evaluation:
  batch_size: 1